<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <!-- 不限制宽度，让大屏真实展示 -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>命运扳机大手子</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="site-title">命运扳机大手子</h1>
  <p class="site-sub">点击角色头像，选出你对每位 Awakener 的熟悉程度，测算你的阶位</p>
</header>

<main>
  <div id="main-layout">
    <!-- 左：角色格子 -->
    <div id="left-col">
      <section id="character-grid"></section>
      <div id="btn-row">
        <button id="btn-confirm">确 认</button>
        <button id="btn-reset">重置</button>
      </div>
    </div>

    <!-- 右：得分表图例 -->
    <aside id="legend-panel">
      <div class="legend-title">熟练度</div>
      <ul id="legend-list">
        <li style="--lc:#e94560"><span class="lv-num">4</span><span class="lv-name">本命 ♥</span></li>
        <li style="--lc:#e67e22"><span class="lv-num">3</span><span class="lv-name">精通</span></li>
        <li style="--lc:#f9d71c"><span class="lv-num">2</span><span class="lv-name">熟悉</span></li>
        <li style="--lc:#4caf84"><span class="lv-num">1</span><span class="lv-name">会玩</span></li>
        <li style="--lc:#c8cdd6"><span class="lv-num">0</span><span class="lv-name">没玩过</span></li>
      </ul>
    </aside>
  </div>

  <!-- 弹窗 -->
  <div id="level-popup" style="display:none;">
    <div class="popup-inner">
      <div class="popup-name" id="popup-name"></div>
      <ul id="popup-levels">
        <li data-level="0">没玩过</li>
        <li data-level="1">1  会玩</li>
        <li data-level="2">2  熟悉</li>
        <li data-level="3">3  精通</li>
        <li data-level="4">4  本命 ♥</li>
      </ul>
    </div>
  </div>
</main>

<!-- 结算区 -->
<section id="result-panel" style="display:none;">
  <div id="result-inner">
    <div id="result-score-wrap">
      <span id="result-score">0</span>
      <span id="result-score-label">分</span>
    </div>
    <div id="result-comment"></div>
    <div id="fav-icon-wrap" style="display:none;">
      <img id="fav-icon" src="" alt="本命">
      <div id="fav-name"></div>
    </div>
    <button id="btn-save">📸 保存分享图片</button>
  </div>
</section>

<!-- 分享图预览层 -->
<div id="output-wrap" style="display:none;">
  <img id="output-img" src="">
  <a id="output-link">关闭预览</a>
</div>

<canvas id="share-canvas" style="display:none;"></canvas>
<script src="script.js"></script>

<!-- ========== 调试面板 ========== -->
<div id="debug-panel">
  <div id="debug-header">
    🔧 尺寸调试  <button id="debug-toggle">收起</button>
  </div>
  <div id="debug-body">
    <label>内容区最大宽 <span id="val-maxw">1800</span>px
      <input type="range" min="800" max="3000" step="20" value="1800" data-var="--db-maxw" data-target="main-layout,result-panel">
    </label>
    <label>卡片宽 <span id="val-cardw">350</span>px
      <input type="range" min="80" max="700" step="5" value="350" data-prop="card-width">
    </label>
    <label>卡片高 <span id="val-cardh">600</span>px
      <input type="range" min="100" max="900" step="10" value="600" data-prop="card-height">
    </label>
    <label>格子间距 <span id="val-gap">12</span>px
      <input type="range" min="4" max="40" step="2" value="12" data-prop="grid-gap">
    </label>
    <label>图例宽 <span id="val-legendw">160</span>px
      <input type="range" min="80" max="280" step="4" value="160" data-prop="legend-width">
    </label>
    <label>标题字号 <span id="val-title">42</span>px
      <input type="range" min="16" max="100" step="2" value="42" data-prop="title-size">
    </label>
    <label>副标题字号 <span id="val-sub">18</span>px
      <input type="range" min="10" max="48" step="1" value="18" data-prop="sub-size">
    </label>
    <label>按钮字号 <span id="val-btn">20</span>px
      <input type="range" min="10" max="48" step="1" value="20" data-prop="btn-size">
    </label>
    <label>图例字号 <span id="val-legend-font">16</span>px
      <input type="range" min="10" max="36" step="1" value="16" data-prop="legend-font">
    </label>
    <label>角色名字号 <span id="val-charname">15</span>px
      <input type="range" min="8" max="32" step="1" value="15" data-prop="charname-size">
    </label>
    <label>header顶部留白 <span id="val-pad">48</span>vh
      <input type="range" min="0" max="70" step="1" value="48" data-prop="header-pad">
    </label>
    <div id="debug-actions">
      <button id="debug-export">📋 复制当前参数</button>
    </div>
  </div>
</div>

<style>
#debug-panel {
  position: fixed;
  bottom: 16px; right: 16px;
  z-index: 9000;
  background: rgba(20,20,30,0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #eee;
  font-family: monospace;
  font-size: 13px;
  width: 300px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
}
#debug-header {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  letter-spacing: 0.5px;
}
#debug-toggle {
  background: rgba(255,255,255,0.1);
  border: none; border-radius: 6px;
  color: #ccc; padding: 3px 10px;
  cursor: pointer; font-size: 12px;
}
#debug-body { padding: 10px 14px 12px; }
#debug-body label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 10px;
  color: #bbb;
}
#debug-body input[type=range] {
  width: 100%;
  accent-color: #e94560;
}
#debug-body span[id^="val"] {
  color: #f9d71c;
  font-weight: 700;
}
#debug-actions { margin-top: 6px; text-align: center; }
#debug-export {
  background: rgba(233,69,96,0.2);
  border: 1px solid rgba(233,69,96,0.4);
  color: #e94560; border-radius: 8px;
  padding: 6px 16px; cursor: pointer;
  font-size: 12px;
}
#debug-export:hover { background: rgba(233,69,96,0.35); }
</style>

<script>
(function(){
  const grid    = document.getElementById('character-grid');
  const layout  = document.getElementById('main-layout');
  const rp      = document.getElementById('result-panel');
  const legend  = document.getElementById('legend-panel');
  const header  = document.querySelector('header');
  const title   = document.querySelector('.site-title');
  const sub     = document.querySelector('.site-sub');
  const btnCon  = document.getElementById('btn-confirm');
  const btnRst  = document.getElementById('btn-reset');

  function setCardWidth(w) {
    // 用固定列宽，自动换行
    grid.style.gridTemplateColumns = `repeat(5, ${w}px)`;
    document.querySelectorAll('.char-card').forEach(c => c.style.width = w+'px');
    document.getElementById('val-cardw').textContent = w;
  }

  function applyAll(){
    const vals = getCurrentVals();
    const mw = vals['main-maxw'] + 'px';
    layout.style.maxWidth = mw;
    if(rp) rp.style.maxWidth = mw;
    setCardWidth(vals['card-width']);
    document.querySelectorAll('.char-card').forEach(c => c.style.height = vals['card-height']+'px');
    grid.style.gap = vals['grid-gap']+'px';
    legend.style.width = vals['legend-width']+'px';
    title.style.fontSize = vals['title-size']+'px';
    sub.style.fontSize   = vals['sub-size']+'px';
    btnCon.style.fontSize = vals['btn-size']+'px';
    btnRst.style.fontSize = vals['btn-size']+'px';
    document.querySelectorAll('.lv-num,.lv-name').forEach(el => el.style.fontSize = vals['legend-font']+'px');
    document.querySelectorAll('.char-name').forEach(el => el.style.fontSize = vals['charname-size']+'px');
    header.style.paddingTop = vals['header-pad']+'vh';
  }

  function getCurrentVals(){
    return {
      'main-maxw':     +document.querySelector('[data-target]').value,
      'card-width':    +document.querySelector('[data-prop="card-width"]').value,
      'card-height':   +document.querySelector('[data-prop="card-height"]').value,
      'grid-gap':      +document.querySelector('[data-prop="grid-gap"]').value,
      'legend-width':  +document.querySelector('[data-prop="legend-width"]').value,
      'title-size':    +document.querySelector('[data-prop="title-size"]').value,
      'sub-size':      +document.querySelector('[data-prop="sub-size"]').value,
      'btn-size':      +document.querySelector('[data-prop="btn-size"]').value,
      'legend-font':   +document.querySelector('[data-prop="legend-font"]').value,
      'charname-size': +document.querySelector('[data-prop="charname-size"]').value,
      'header-pad':    +document.querySelector('[data-prop="header-pad"]').value,
    };
  }

  // 内容区宽
  document.querySelector('[data-target]').addEventListener('input', function(){
    document.getElementById('val-maxw').textContent = this.value;
    layout.style.maxWidth = this.value + 'px';
    if(rp) rp.style.maxWidth = this.value + 'px';
  });

  const propMap = {
    'card-width':    (v) => { setCardWidth(v); document.getElementById('val-cardw').textContent=v; },
    'card-height':   (v) => { document.querySelectorAll('.char-card').forEach(c=>c.style.height=v+'px'); document.getElementById('val-cardh').textContent=v; },
    'grid-gap':      (v) => { grid.style.gap=v+'px'; document.getElementById('val-gap').textContent=v; },
    'legend-width':  (v) => { legend.style.width=v+'px'; document.getElementById('val-legendw').textContent=v; },
    'title-size':    (v) => { title.style.fontSize=v+'px'; document.getElementById('val-title').textContent=v; },
    'sub-size':      (v) => { sub.style.fontSize=v+'px'; document.getElementById('val-sub').textContent=v; },
    'btn-size':      (v) => { btnCon.style.fontSize=v+'px'; btnRst.style.fontSize=v+'px'; document.getElementById('val-btn').textContent=v; },
    'legend-font':   (v) => { document.querySelectorAll('.lv-num,.lv-name').forEach(el=>el.style.fontSize=v+'px'); document.getElementById('val-legend-font').textContent=v; },
    'charname-size': (v) => { document.querySelectorAll('.char-name').forEach(el=>el.style.fontSize=v+'px'); document.getElementById('val-charname').textContent=v; },
    'header-pad':    (v) => { header.style.paddingTop=v+'vh'; document.getElementById('val-pad').textContent=v; },
  };

  document.querySelectorAll('[data-prop]').forEach(slider => {
    const prop = slider.dataset.prop;
    if(propMap[prop]) slider.addEventListener('input', function(){ propMap[prop](+this.value); });
  });

  // 收起/展开
  document.getElementById('debug-toggle').addEventListener('click', function(){
    const body = document.getElementById('debug-body');
    if(body.style.display==='none'){ body.style.display=''; this.textContent='收起'; }
    else { body.style.display='none'; this.textContent='展开'; }
  });

  // 复制参数
  document.getElementById('debug-export').addEventListener('click', function(){
    const v = getCurrentVals();
    const txt = JSON.stringify(v, null, 2);
    navigator.clipboard.writeText(txt).then(()=>alert('已复制！\n\n'+txt));
  });

  setTimeout(applyAll, 300);
  new MutationObserver(()=>{ setTimeout(applyAll,100); }).observe(grid,{childList:true});
})();
</script>
</body>
</html>
